<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="heading">The Game</h1>

    <div class="choices">

        <div id="rock" class="choice">
            <img src="rock.png" alt="Rock">
        </div>

        <div id="paper" class="choice">
            <img src="paper.png" alt="Paper">
        </div>

        <div id="scissor" class="choice">
            <img src="scissor.png" alt="Scissor">
        </div>

    </div>

    <div id="points">
        <div id="user" class="point"><h3 id="userr">0</h3></div>
        <div id="computer" class="point"><h3 id="computerr">0</h3></div>
    </div>
    <div id="name">
        <div id="play1"><h3>You</h3></div>
        <div id="play2"><h3>Computer</h3></div>
    </div>

     <div id="comp">
        <div id="compmov" class="choice">
            <img src="mark.png" alt="">
        </div>
     </div>

     <div id="bot"><h3>Computer Move</h3></div>

    <div id="winbox" class="same">
        <div id="box">
        <h2 id="winner">Who is winner ?</h2>
        </div>
    </div>

    <div class="same">
    <div id="reset"><h2>reset</h2></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
